<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CleanShort - Encurtador de Links</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons CDN -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .animate-spin { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-[#f5f5f5] min-h-screen flex flex-col items-center justify-center p-4">

    <div class="w-full max-w-md fade-in">
        <div class="bg-white rounded-3xl shadow-sm border border-black/5 p-8 md:p-10">
            <!-- Header -->
            <div class="flex items-center gap-3 mb-8">
                <div class="bg-black text-white p-2 rounded-xl">
                    <i data-lucide="scissors" class="w-6 h-6"></i>
                </div>
                <h1 class="text-2xl font-semibold tracking-tight text-gray-900">CleanShort</h1>
            </div>

            <!-- Form -->
            <form id="shortenForm" class="space-y-4">
                <div class="relative">
                    <div class="absolute inset-y-0 left-4 flex items-center pointer-events-none text-gray-400">
                        <i data-lucide="link-2" class="w-[18px] h-[18px]"></i>
                    </div>
                    <input
                        type="url"
                        id="urlInput"
                        placeholder="Cole seu link longo aqui..."
                        required
                        class="w-full pl-11 pr-4 py-4 bg-gray-50 border border-gray-100 rounded-2xl focus:outline-none focus:ring-2 focus:ring-black/5 focus:border-gray-200 transition-all text-gray-800 placeholder:text-gray-400"
                    >
                </div>

                <button
                    type="submit"
                    id="submitBtn"
                    class="w-full py-4 bg-black text-white rounded-2xl font-medium hover:bg-gray-900 transition-all disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center gap-2"
                >
                    <span id="btnText">Encurtar Link</span>
                    <i id="loadingIcon" data-lucide="loader-2" class="w-5 h-5 animate-spin hidden"></i>
                </button>
            </form>

            <!-- Error Message -->
            <div id="errorMessage" class="mt-6 p-4 bg-red-50 text-red-600 rounded-xl text-sm font-medium hidden fade-in"></div>

            <!-- Result -->
            <div id="resultContainer" class="mt-8 p-6 bg-gray-50 rounded-2xl border border-gray-100 hidden fade-in">
                <p class="text-xs font-medium text-gray-400 uppercase tracking-wider mb-3">Link Encurtado</p>
                <div class="flex items-center gap-2">
                    <div id="shortUrlDisplay" class="flex-1 truncate font-medium text-gray-900 bg-white border border-gray-100 px-4 py-3 rounded-xl">
                        https://gotiny.cc/abcd
                    </div>
                    <button
                        id="copyBtn"
                        class="p-3 bg-white border border-gray-100 rounded-xl hover:bg-gray-50 transition-all text-gray-600"
                        title="Copiar link"
                    >
                        <i id="copyIcon" data-lucide="copy" class="w-5 h-5"></i>
                        <i id="checkIcon" data-lucide="check" class="w-5 h-5 text-green-500 hidden"></i>
                    </button>
                    <a
                        id="openLink"
                        href="#"
                        target="_blank"
                        rel="noopener noreferrer"
                        class="p-3 bg-white border border-gray-100 rounded-xl hover:bg-gray-50 transition-all text-gray-600"
                        title="Abrir link"
                    >
                        <i data-lucide="external-link" class="w-5 h-5"></i>
                    </a>
                </div>
            </div>
        </div>

        <div class="mt-8 text-center">
            <p class="text-sm text-gray-400">
                Simples. Rápido. Limpo.
            </p>
        </div>
    </div>

    <script>
        // Initialize Lucide Icons
        lucide.createIcons();

        const form = document.getElementById('shortenForm');
        const urlInput = document.getElementById('urlInput');
        const submitBtn = document.getElementById('submitBtn');
        const btnText = document.getElementById('btnText');
        const loadingIcon = document.getElementById('loadingIcon');
        const errorMessage = document.getElementById('errorMessage');
        const resultContainer = document.getElementById('resultContainer');
        const shortUrlDisplay = document.getElementById('shortUrlDisplay');
        const copyBtn = document.getElementById('copyBtn');
        const copyIcon = document.getElementById('copyIcon');
        const checkIcon = document.getElementById('checkIcon');
        const openLink = document.getElementById('openLink');

        let currentShortUrl = '';

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const url = urlInput.value.trim();
            if (!url) return;

            // Reset UI
            setLoading(true);
            errorMessage.classList.add('hidden');
            resultContainer.classList.add('hidden');

            try {
                const response = await fetch('https://gotiny.cc/api', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ input: url })
                });

                const data = await response.json();

                if (response.ok && data.length > 0) {
                    currentShortUrl = `https://gotiny.cc/${data[0].code}`;
                    shortUrlDisplay.textContent = currentShortUrl;
                    openLink.href = currentShortUrl;
                    resultContainer.classList.remove('hidden');
                } else {
                    showError('Ocorreu um erro ao encurtar o link. Verifique a URL.');
                }
            } catch (err) {
                showError('Erro de conexão. Tente novamente mais tarde.');
            } finally {
                setLoading(false);
            }
        });

        function setLoading(isLoading) {
            submitBtn.disabled = isLoading;
            if (isLoading) {
                btnText.textContent = 'Encurtando...';
                loadingIcon.classList.remove('hidden');
            } else {
                btnText.textContent = 'Encurtar Link';
                loadingIcon.classList.add('hidden');
            }
        }

        function showError(msg) {
            errorMessage.textContent = msg;
            errorMessage.classList.remove('hidden');
        }

        copyBtn.addEventListener('click', () => {
            if (!currentShortUrl) return;
            navigator.clipboard.writeText(currentShortUrl).then(() => {
                copyIcon.classList.add('hidden');
                checkIcon.classList.remove('hidden');
                setTimeout(() => {
                    copyIcon.classList.remove('hidden');
                    checkIcon.classList.add('hidden');
                }, 2000);
            });
        });
    </script>
</body>
</html>
